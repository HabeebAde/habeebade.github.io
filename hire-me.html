        <h1 class="title text-semibold" data-aos="fade-up">Hire me Today</h1>
        <section class="sendMeAMessage">
            <h2 class="title text-semibold">Send Me A Message</h2>
            <h5 class="gotAQuestion title text-light">Got a question or proposal, or just want <br> to say hello? Go ahead.</h5>
                <br><br>
            <form>
                <div class="form-row form-row1">
                    <div class="form-col form-col-name" data-aos="fade-up">
                        <label for="name" class="form-label" required>Your Name</label><br>
                        <input type="text" placeholder="Enter Your Name" id="name">
                    </div>
                    <div class="form-col" data-aos="fade-up">
                        <label for="email" class="form-label" required>Email Address</label><br>
                        <input type="email" placeholder="Enter Your Email Address" id="email">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-col" data-aos="fade-up">
                        <label for="Name" class="form-label" required>Your Message</label><br>
                        <textarea id="message" rows="3" placeholder="Hi, I think we need a design for our product at Company X. How soon can you hop on to discuss this?"></textarea>
                    </div>
                </div>
                <div class="shootBtnCont" data-aos="fade-up">
                    <button type="submit" class="btn shootBtn">Shoot &nbsp;
                        <i class="fas fa-arrow-right"></i>
                    </button>
                </div>
            </form>
        </section>
    </main>
